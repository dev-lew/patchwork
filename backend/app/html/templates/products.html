{% extends "layout.html" %} {% block content %}
<div class="mx-auto -mt-20 max-w-[120rem]">
  <div class="max-h-[35vh] w-full overflow-hidden">
    <video
      class="h-full w-full object-cover"
      playsinline
      autoplay
      loop
      muted
      preload="auto"
    >
      <source src="/static/videos/products-preview.mp4" type="video/mp4" />
    </video>
  </div>
</div>
<div class="mx-auto max-w-[120rem] px-10 py-8">
  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
    {% for p in products %}
    <div class="group bg-[color:var(--color-bg)]">
      <div
        class="aspect-square overflow-hidden bg-[color:var(--color-bg-soft)]"
      >
        <img
          src="{{ p.picture }}"
          alt="{{ p.name }}"
          class="h-full w-full object-cover transition duration-300 group-hover:opacity-90"
        />
      </div>
      <div class="pt-3">
        <h3 class="text-sm tracking-wide text-[color:var(--color-text)]">
          {{ p.name }}
        </h3>
        <div class="mt-2 flex items-center justify-between">
          <span class="text-sm font-semibold text-[color:var(--color-text)]">
            ${{ '%.2f'|format(p.price) }}
          </span>
          {% if p.quantity > 0 %}
          <span class="text-xs text-[color:var(--color-text)] opacity-70">
            In stock
          </span>
          {% else %}
          <span class="text-xs text-[color:var(--color-text)] opacity-40">
            Out of stock
          </span>
          {% endif %}
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
