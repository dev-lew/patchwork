{% extends 'layout.html' %}

{% block content %}
      <div class="max-w-7xl mx-auto px-4 py-8">
        <h2 class="text-2xl font-semibold mb-6">
          Products
        </h2>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
          {% for p in products %}

          <div class="bg-white rounded-2xl shadow-sm hover:shadow-md transition overflow-hidden">
            <div class="aspect-square bg-gray-100 flex items-center justify-center">
              <img src="{{ p.picture }}" alt="{{ p.name }}"
                   class="object-contain h-full w-full p-6">
            </div>
          </div>

          <div class="p-4">
            <h3 class="text-lg font-medium text-gray-900">
              {{ p.name }}
            </h3>

            <div class="mt-3 flex items-center justify-between">
              <span class="text-base font-semibold text-gray-900">
                ${{ '%.2f'|format(p.price) }}
              </span>
              {% if p.quantity > 0 %}
              <span class="text-xs text-green-600">In stock</span>
              {% else %}
              <span class="text-xs text-red-500">Out of stock</span>
              {% endif %}
            </div>
          </div>
          {% endfor %}
        </div>
      </div>
{% endblock %}
