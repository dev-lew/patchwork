{% extends 'layout.html' %} {% block content %}
<div class="mx-auto max-w-7xl px-4 py-8">
  <h2 class="mb-6 text-2xl font-semibold">Products</h2>
  <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
    {% for p in products %}
    <div
      class="overflow-hidden rounded-2xl bg-white shadow-sm transition hover:shadow-md"
    >
      <div class="flex aspect-square items-center justify-center bg-gray-100">
        <img
          src="{{ p.picture }}"
          alt="{{ p.name }}"
          class="h-full w-full object-contain p-6"
        />
      </div>
    </div>
    <div class="p-4">
      <h3 class="text-lg font-medium text-gray-900">{{ p.name }}</h3>
      <div class="mt-3 flex items-center justify-between">
        <span class="text-base font-semibold text-gray-900">
          ${{ '%.2f'|format(p.price) }}
        </span>
        {% if p.quantity > 0 %}
        <span class="text-xs text-green-600">In stock</span>
        {% else %}
        <span class="text-xs text-red-500">Out of stock</span>
        {% endif %}
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
