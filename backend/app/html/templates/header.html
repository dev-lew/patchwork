<header
  id="site-header"
  class="sticky top-0 left-0 z-50 w-full border-b border-black py-4 duration-400"
>
  <div
    class="flex items-center justify-between px-6 text-sm tracking-wide text-black"
  >
    <nav class="flex items-center gap-8">
      <a href="/html/products">shop</a>
      {% if user %}
      <a href="/html/login" hx-post="/html/logout">sign out</a>
      {% else %}
      <a href="/html/login">sign in</a>
      {% endif %}
      <a href="/html/about">about</a>
    </nav>
    <div class="absolute left-1/2 -translate-x-1/2">
      <a href="/" class="text-lg font-semibold tracking-[0.25em] text-black">
        PATCHWORK STORE
      </a>
    </div>
    <div class="flex items-center gap-5">
      <button>
        <svg
          class="h-5 w-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <circle cx="11" cy="11" r="7" stroke-width="1.5"></circle>
          <path d="M20 20L17 17" stroke-width="1.5"></path>
        </svg>
      </button>
      <a href="/html/account">
        <svg
          class="h-5 w-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <circle cx="12" cy="8" r="4" stroke-width="1.5"></circle>
          <path d="M4 20c1.5-4 14.5-4 16 0" stroke-width="1.5"></path>
        </svg>
      </a>
      <a href="/html/cart">
        <svg
          class="h-5 w-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path d="M6 6h15l-1.5 9h-12z" stroke-width="1.5"></path>
          <circle cx="9" cy="21" r="1" />
          <circle cx="18" cy="21" r="1" />
        </svg>
      </a>
    </div>
  </div>
</header>
