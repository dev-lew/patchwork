{% extends "layout.html" %}{% block content %}
<div class="flex min-h-screen items-center justify-center px-4">
  <div class="border-black-100 w-full max-w-md border p-10">
    <div class="mb-8 text-center">
      <h1 class="text-xl tracking-wide">Create Account</h1>
    </div>
    {% if error %}
    <div
      class="mb-4 border border-red-300 bg-red-50 px-4 py-3 text-sm text-red-600"
    >
      {{ error }}
    </div>
    {% endif %}
    <form method="POST" class="space-y-5">
      <div>
        <label class="mb-2 block text-xs tracking-wide text-gray-500">
          USERNAME
        </label>
        <input
          type="text"
          name="username"
          required
          class="w-full border border-gray-200 px-4 py-3 text-sm transition focus:border-gray-400 focus:outline-none"
        />
      </div>
      <div>
        <label class="mb-2 block text-xs tracking-wide text-gray-500">
          EMAIL
        </label>
        <input
          type="email"
          name="email"
          required
          class="w-full border border-gray-200 px-4 py-3 text-sm transition focus:border-gray-400 focus:outline-none"
        />
      </div>
      <div>
        <label class="mb-2 block text-xs tracking-wide text-gray-500">
          PASSWORD
        </label>
        <input
          type="password"
          name="password"
          required
          class="w-full border border-gray-200 px-4 py-3 text-sm transition focus:border-gray-400 focus:outline-none"
        />
      </div>
      <div>
        <label class="mb-2 block text-xs tracking-wide text-gray-500">
          CONFIRM PASSWORD
        </label>
        <input
          type="password"
          name="confirm_password"
          required
          class="w-full border border-gray-200 px-4 py-3 text-sm transition focus:border-gray-400 focus:outline-none"
        />
      </div>
      <button
        type="submit"
        class="w-full bg-black py-3 text-sm tracking-wide text-white transition hover:bg-[color:var(--color-accent)]"
      >
        CREATE ACCOUNT
      </button>
    </form>
    <div class="my-8 border-t border-gray-100"></div>
    <div class="text-center">
      <p class="text-sm text-gray-500">Already have an account?</p>
      <a
        href="/html/login"
        class="mt-2 inline-block text-sm text-black underline"
      >
        Sign in
      </a>
    </div>
  </div>
</div>
{% endblock %}
