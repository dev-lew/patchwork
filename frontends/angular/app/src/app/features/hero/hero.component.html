
<section class="hero-container">
    <div class="video-wrapper">
        <video #heroVideo autoplay muted loop playsinline class="video-bg">
            <source src="https://lilluvdog.com/cdn/shop/videos/c/vp/c2a0a8cb50594b7ebec8b5c8058cfd74/c2a0a8cb50594b7ebec8b5c8058cfd74.HD-1080p-7.2Mbps-66374547.mp4?v=0" type="video/mp4">
        </video>
    </div>

    <div class="hero-overlay">
        <h1 class="hero-title">Clean Beauty <i>for Dogs</i></h1>
        <p class="hero-subtitle">
            For people who care about their dog's beauty <br> routine as much as their own
        </p>
    </div>

    <button class="video-control" (click)="togglePlay()" [attr.aria-label]="isPaused ? 'Play' : 'Pause'">
        @if (isPaused) {
            <svg width="14" height="14" viewBox="0 0 14 14">
                <line x1="3" y1="0" x2="3" y2="14" stroke="#fff" stroke-width="2"></line>
                <line x1="9" y1="0" x2="9" y2="14" stroke="#fff" stroke-width="2"></line>
            </svg>
        } @else {
            <svg width="14" height="14" viewBox="0 0 14 14">
                <polygon points="2,1 12,7 2,13" fill="#fff"></polygon>
            </svg>
        }
  </button>

</section>
