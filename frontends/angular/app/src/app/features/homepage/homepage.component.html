<div class="header-container">
  <app-header [searchOpen]= "searchOpen" (openSearch)="openSearch()" (openCart)="openCart()"></app-header>
</div>

<app-search-modal
  *ngIf="searchOpen"
  (close)="closeSearch()">
</app-search-modal>

<app-cart-modal
  *ngIf="cartOpen"
  (close)="closeCart()">
</app-cart-modal>

<div class="page-content" [class.blurred]="searchOpen">
  <main>
    <app-hero></app-hero>
    <app-products></app-products>
  </main>

  <app-footer></app-footer>
</div>
