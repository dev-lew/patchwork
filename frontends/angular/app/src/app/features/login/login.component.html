<div class="auth-page">
  <div class="auth-container">
    
    <div class="auth-header">
      <span class="auth-title">{{ authMode === 'login' ? 'log in' : 'create account' }}</span>
      <button type="button" class="close-button" routerLink="/" aria-label="Close">
        <svg class="icon icon-close" aria-hidden="true" focusable="false" width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M16.5 1.5L1.5 16.5M1.5 1.5L16.5 16.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>
    </div>

    <div class="auth-body">
      <div *ngIf="errorMessage" class="error-banner">
        {{ errorMessage }}
      </div>

      <form [formGroup]="authForm" (ngSubmit)="onSubmit()" class="auth-form">
        <input
          *ngIf="authMode === 'register'"
          type="email"
          placeholder="email"
          formControlName="email"
          class="auth-input"
        />
        
        <input
          type="text"
          placeholder="username"
          formControlName="username"
          class="auth-input"
        />
        
        <input
          type="password"
          placeholder="password"
          formControlName="password"
          class="auth-input"
        />
        
        <button type="submit" class="checkout-button submit-btn" [disabled]="authForm.invalid || isLoading">
          {{ isLoading ? 'processing...' : (authMode === 'login' ? 'sign in' : 'register') }}
        </button>
      </form>

      <button type="button" class="toggle-mode-btn" (click)="toggleMode()">
        {{ authMode === 'login' ? 'need an account? register' : 'already have an account? log in' }}
      </button>
    </div>
    
  </div>
</div>
